<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midnight Game #2</title>
    <style media='screen' type='text/css'>
      @font-face {
        font-family: yana;
        src: url('public/yana.ttf');
        font-weight:400;
        font-weight:normal;
      }
</style>
  </head>
  <body>
    <div id="root"></div>
    <div style="font-family:yana; position:absolute; left:-1000px; visibility:hidden;">.</div>
    <script type="module">
      // Buffer must be globally available before any CJS module initializes.
      // We split the entry point so Buffer is set before the app module graph loads.
      import { Buffer } from 'buffer';
      globalThis.Buffer = Buffer;
      await import('/src/main.tsx');
    </script>
  </body>
</html>
